<!DOCTYPE html>
<html>
<head>
  <title>Campus Navigation</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .topbar {
      background: #2c3e50;
      padding: 10px;
      color: white;
      display: flex;
      gap: 10px;
    }

    input {
      padding: 8px;
      width: 200px;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }

    #map {
      height: 90vh;
    }
  </style>
</head>

<body>

<div class="topbar">
  <input id="searchBox" placeholder="Search building...">
  <button onclick="searchPlace()">Go</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 1. Create map
  var map = L.map('map').setView([9.9252, 78.1198], 16);

  // 2. Load OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Campus Map'
  }).addTo(map);

  // 3. Campus locations (EDIT THESE LATER)
  var places = {
    "library": [9.9258, 78.1205],
    "cse lab": [9.9252, 78.1198],
    "hostel": [9.9265, 78.1210],
    "canteen": [9.9248, 78.1195]
  };

  // 4. Add markers
  for (let key in places) {
    L.marker(places[key]).addTo(map)
      .bindPopup(key.toUpperCase());
  }

  // 5. Search function
  function searchPlace() {
    let input = document.getElementById("searchBox").value.toLowerCase();

    if (places[input]) {
      map.setView(places[input], 18);
      L.popup()
        .setLatLng(places[input])
        .setContent("You selected: " + input.toUpperCase())
        .openOn(map);
    } else {
      alert("Place not found! Try: library, cse lab, hostel, canteen");
    }
  }
</script>

</body>
</html>
