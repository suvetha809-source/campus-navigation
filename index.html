<!DOCTYPE html>
<html>
<head>
    <title>Campus Navigation</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            display: flex;
        }

        /* LEFT SIDE */
        .map-container {
            width: 70%;
            text-align: center;
            padding: 20px;
        }

        img {
            width: 90%;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            margin: 10px;
            cursor: pointer;
        }

        /* RIGHT SIDE */
        .sidebar {
            width: 30%;
            background: #f4f4f4;
            padding: 20px;
        }

        li {
            margin: 5px 0;
        }
    </style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="map-container">

    <h2 id="floorTitle">Ground Floor</h2>

    <!-- YOUR IMAGE -->
    <img src="first.jpeg">

    <br>

    <button onclick="prevFloor()">⬅ Previous</button>
    <button onclick="nextFloor()">Next ➡</button>

</div>

<!-- RIGHT SIDE -->
<div class="sidebar">
    <h3>Places</h3>
    <ul id="placesList"></ul>
</div>

<script>

// FLOOR DATA
let floors = [
    {
        name: "Ground Floor",
        places: ["Entrance", "Reception", "Canteen", "Office"]
    },
    {
        name: "First Floor",
        places: ["Classroom 101", "Lab", "Library", "Washroom"]
    },
    {
        name: "Second Floor",
        places: ["Classroom 201", "Seminar Hall", "Staff Room"]
    }
];

let currentFloor = 0;

// UPDATE FUNCTION
function updateFloor() {

    document.getElementById("floorTitle").innerText =
        floors[currentFloor].name;

    let list = document.getElementById("placesList");
    list.innerHTML = "";

    floors[currentFloor].places.forEach(place => {
        let li = document.createElement("li");
        li.innerText = place;
        list.appendChild(li);
    });
}

// NEXT BUTTON
function nextFloor() {
    if (currentFloor < floors.length - 1) {
        currentFloor++;
        updateFloor();
    }
}

// PREVIOUS BUTTON
function prevFloor() {
    if (currentFloor > 0) {
        currentFloor--;
        updateFloor();
    }
}

// INITIAL LOAD
updateFloor();

</script>

</body>
</html>
