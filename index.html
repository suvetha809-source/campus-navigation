<!DOCTYPE html>
<html>
<head>
  <title>Campus Navigation System</title>

  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .topbar {
      background: #1e2a38;
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      color: white;
    }

    input {
      padding: 8px;
      width: 220px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: #00c2ff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #009ed1;
    }

    #map {
      height: 92vh;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h3 style="margin:0;">Campus Navigator</h3>
  <input id="searchBox" placeholder="Search: library, hostel, lab...">
  <button onclick="searchPlace()">Go</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 🗺️ Create Map
  var map = L.map('map').setView([9.9252, 78.1198], 16);

  // 🌍 OpenStreetMap Tiles (real map data)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Campus Navigation System',
    maxZoom: 19
  }).addTo(map);

  // 🏫 Campus Locations (EDIT THESE FOR YOUR COLLEGE)
  var places = {
    "library": [9.9258, 78.1205],
    "cse lab": [9.9252, 78.1198],
    "hostel": [9.9265, 78.1210],
    "canteen": [9.9248, 78.1195],
    "admin block": [9.9255, 78.1188]
  };

  // 📍 Add markers for all places
  for (let key in places) {
    L.marker(places[key]).addTo(map)
      .bindPopup("🏫 " + key.toUpperCase());
  }

  // 🧍 User location marker
  let userMarker;
  let routeLine;
  let targetMarker;

  // 📍 Get user location
  map.locate({setView: true, maxZoom: 18});

  map.on("locationfound", function(e) {
    if (userMarker) {
      map.removeLayer(userMarker);
    }

    userMarker = L.marker(e.latlng)
      .addTo(map)
      .bindPopup("📍 You are here")
      .openPopup();
  });

  map.on("locationerror", function() {
    alert("Location access denied. Enable GPS for navigation.");
  });

  // 🔍 Search + Route function
  function searchPlace() {
    let input = document.getElementById("searchBox").value.toLowerCase();

    if (!places[input]) {
      alert("Place not found! Try: library, hostel, canteen, cse lab");
      return;
    }

    let destination = places[input];

    // Remove old route if exists
    if (routeLine) {
      map.removeLayer(routeLine);
    }

    // Remove old target marker
    if (targetMarker) {
      map.removeLayer(targetMarker);
    }

    // Get user position
    let start = map.getCenter();

    if (userMarker) {
      start = userMarker.getLatLng();
    }

    // 🎯 Destination marker
    targetMarker = L.marker(destination, {color: "red"})
      .addTo(map)
      .bindPopup("🎯 Destination: " + input.toUpperCase())
      .openPopup();

    // 🚶 Route line (simple straight line)
    routeLine = L.polyline([start, destination], {
      color: "blue",
      weight: 4
    }).addTo(map);

    // Zoom to destination
    map.setView(destination, 18);
  }
</script>

</body>
</html>
