<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Navigation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LANDING -->
<div id="landing" class="center">
    <h1>🏠 You are at Home</h1>
    <button onclick="openMap()">Navigate to College</button>
    <button onclick="enterCampus()">Skip</button>
</div>

<div id="mapPage" class="hidden center">
    <h2>Getting your location...</h2>
    <button onclick="getRoute()">Open Route in Maps</button>
    <button onclick="enterCampus()">I Reached College</button>
    <button onclick="goBackToApp()">⬅ Back to App</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

    <!-- HEADER -->
    <header>
        <h2>Campus Navigation</h2>

        <div class="right-controls">
            <div class="search-box">
                <input type="text" id="search" placeholder="Search location...">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <button onclick="toggleLanguage()">🌐</button>
        </div>
    </header>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <button onclick="loadFloor('ground.jpeg')">Ground</button>
        <button onclick="loadFloor('first.jpeg')">1st Floor</button>
        <button onclick="loadFloor('second.jpeg')">2nd Floor</button>
        <button onclick="loadFloor('third.jpeg')">3rd Floor</button>
    </div>

    <!-- MAP -->
    <div class="map-container">
        <img id="floorMap" src="ground.jpeg">
        <div id="locationsBox" class="locations"></div>
    </div>

    <!-- FLOATING BUTTONS -->
    <div class="controls">
        <button onclick="zoomIn()">+</button>
        <button onclick="zoomOut()">-</button>
        <button onclick="startAssistant()">🎤</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
