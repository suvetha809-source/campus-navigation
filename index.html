<!DOCTYPE html>
<html>
<head>
  <title>Smart Campus Navigation System</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .topbar {
      background: #1e2a38;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      color: white;
    }

    input {
      padding: 8px;
      width: 220px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: #00c2ff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #009ecf;
    }

    #map {
      height: 65vh;
    }

    #panel {
      height: 25vh;
      overflow-y: auto;
      background: #f4f4f4;
      padding: 10px;
    }

    .step {
      background: white;
      padding: 8px;
      margin: 5px 0;
      border-left: 4px solid #00c2ff;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h3 style="margin:0;">Campus Navigator</h3>
  <input id="searchBox" placeholder="Search: library, hostel...">
  <button onclick="navigate()">Start</button>
  <button onclick="repeatVoice()">🔊 Repeat</button>
</div>

<div id="map"></div>
<div id="panel">Directions will appear here...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 🗺️ MAP INIT
  var map = L.map('map').setView([9.9252, 78.1198], 16);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // 🏫 CAMPUS LOCATIONS
  var places = {
    "library": [9.9258, 78.1205],
    "cse lab": [9.9252, 78.1198],
    "hostel": [9.9265, 78.1210],
    "canteen": [9.9248, 78.1195],
    "admin block": [9.9255, 78.1188]
  };

  // 📍 Mark all places
  for (let p in places) {
    L.marker(places[p]).addTo(map)
      .bindPopup("🏫 " + p.toUpperCase());
  }

  let userPos = null;
  let routeLine;
  let lastSteps = [];

  // 📍 Get user location
  map.locate({setView: true, maxZoom: 18});

  map.on("locationfound", function(e) {
    userPos = e.latlng;

    L.marker(userPos)
      .addTo(map)
      .bindPopup("📍 You are here")
      .openPopup();
  });

  map.on("locationerror", function() {
    alert("Enable GPS for navigation.");
  });

  // 🗣️ Voice function
  function speak(text) {
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-US";
    msg.rate = 1;
    window.speechSynthesis.speak(msg);
  }

  // 🚶 MAIN NAVIGATION FUNCTION
  function navigate() {
    let input = document.getElementById("searchBox").value.toLowerCase();

    if (!places[input]) {
      alert("Place not found!");
      return;
    }

    if (!userPos) {
      alert("Waiting for GPS location...");
      return;
    }

    let dest = places[input];

    // remove old route
    if (routeLine) map.removeLayer(routeLine);

    // draw route line
    routeLine = L.polyline([userPos, dest], {
      color: "blue",
      weight: 4
    }).addTo(map);

    map.fitBounds(routeLine.getBounds());

    // 📌 create steps
    let steps = [
      "Step 1: Start from your current location",
      "Step 2: Walk straight towards campus road",
      "Step 3: Follow signs to " + input.toUpperCase(),
      "Step 4: You have reached " + input.toUpperCase()
    ];

    lastSteps = steps;
    showSteps(steps);
  }

  // 📋 SHOW STEPS + VOICE
  function showSteps(steps) {
    let panel = document.getElementById("panel");
    panel.innerHTML = "";

    steps.forEach((step, i) => {
      let div = document.createElement("div");
      div.className = "step";
      div.innerHTML = "👉 " + step;
      panel.appendChild(div);

      // 🔊 speak with delay
      setTimeout(() => {
        speak(step);
      }, i * 2500);
    });
  }

  // 🔁 repeat voice
  function repeatVoice() {
    lastSteps.forEach((step, i) => {
      setTimeout(() => speak(step), i * 2500);
    });
  }
</script>

</body>
</html>
