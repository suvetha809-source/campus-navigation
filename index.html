<script>
    function findLocation() {
        let input = document.getElementById("locationInput").value.toLowerCase().trim();
        let result = document.getElementById("result");

        if (input === "") {
            result.innerHTML = "Please enter a location";
            return;
        }

        // Washroom (all floors)
        if (input.includes("washroom") || input.includes("toilet")) {
            result.innerHTML = "Washrooms are available on every floor (2 per floor)";
        }

        // CEC Department
        else if (input.includes("cse")) {
            result.innerHTML = "CSE Department - 1st Floor";
        }

        // Civil Department
        else if (input.includes("civil")) {
            result.innerHTML = "Civil Department - 1st Floor";
        }

        // PRR Seminar Hall
        else if (input.includes("prr") || input.includes("seminar")) {
            result.innerHTML = "PRR Seminar Hall - 3rd Floor";
        }

        else {
            result.innerHTML = "Location not found";
        }
    }
</script>
